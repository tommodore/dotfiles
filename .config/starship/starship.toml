# ~/.config/starship/starship.toml

# Global
add_newline = true
scan_timeout = 10
command_timeout = 500
palette = "tokyonight"

# Format: Removed confusing background transitions. Everything floats on the terminal bg.
format = """
[$username]($username)[$directory]($directory)[$git_branch]($git_branch)[$git_status]($git_status)
$character"""

right_format = "[$cmd_duration]($cmd_duration)[$python]($python)[$time]($time) "

# ---------------------------------------------------------
# 🎨 Tokyo Night Palette (Storm)
# ---------------------------------------------------------
[palettes.tokyonight]
accent = "#7aa2f7"      # Blue
success = "#9ece6a"     # Green
warning = "#e0af68"     # Orange
error = "#f7768e"       # Red
text = "#a9b1d6"        # Storm FG (slightly dimmer than pure white)
dim = "#565f89"         # Comments/Dim text

# ---------------------------------------------------------
# Modules
# ---------------------------------------------------------

# Username
[username]
show_always = false
style_user = "accent bold"
style_root = "error bold"
format = "[$user]($style) "

# Directory
[directory]
style = "accent bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 🔒"

# Git branch
[git_branch]
symbol = " "
style = "success bold"   # Green text, no background
format = "[$symbol$branch]($style)"

# Git status
[git_status]
style = "warning"       # Orange text, no background
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${count}"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
format = "([$all_status$ahead_behind]($style))"

# Character
[character]
success_symbol = "[❯](bold success)"
error_symbol = "[❯](bold error)"
vicmd_symbol = "[❮](bold success)"
format = "$symbol "

# Cmd duration
[cmd_duration]
min_time = 2000
style = "dim"  # Dimmer look for less distraction
format = "took [$duration]($style)"

# Python
[python]
symbol = " "
style = "accent"
format = "[$symbol($virtualenv)]($style)"

# Time
[time]
disabled = false
time_format = "%H:%M"
style = "dim"
format = "[$time]($style)"
